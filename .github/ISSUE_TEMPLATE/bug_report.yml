name: Bug report

description: Report a defect in CAPSULA Studio.

title: "bug: "

labels: ["bot:triage", "type:bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a CAPSULA issue. The issue bot will classify runtime lane, priority, and next owner.
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Web Studio
        - Python runtime
        - MCP AI server
        - Expo Go generator
        - WASM planner
        - GitHub deploy
        - CI / build
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What happened?
      placeholder: Describe the broken behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell
